<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderMap: Travel Diary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>WanderMap</h1>
        <nav>
            <button id="nav-dashboard">Dashboard</button>
            <button id="nav-new-trip">+ New Trip</button>
        </nav>
    </header>

    <main>
        <section id="view-dashboard" class="view active">
            <h2>My Travels</h2>
            <div class="dashboard-layout">
                <div id="map-container">
                    <div class="map-placeholder">Map will be rendered here</div>
                </div>
                <aside id="trip-list">
                    <h3>Recent Trips</h3>
                    <ul id="trips-ul">
                        <li>No trips recorded yet.</li>
                    </ul>
                </aside>
            </div>
        </section>

        <section id="view-form" class="view">
            <h2>Log a New Trip</h2>
            <form id="new-trip-form">
                <div class="form-group">
                    <label for="trip-title">Destination:</label>
                    <input type="text" id="trip-title" name="trip-title" required autofocus placeholder="e.g., Cesky Krumlov">
                </div>
                
                <div class="form-group">
                    <label for="trip-date">Date:</label>
                    <input type="date" id="trip-date" name="trip-date" required>
                </div>

                <div class="form-group">
                    <label>Rating:</label>
                    <star-rating id="trip-rating"></star-rating>
                </div>
                
                <div class="form-group">
                    <label for="trip-notes">Notes:</label>
                    <textarea id="trip-notes" name="trip-notes" rows="4" placeholder="What did you experience?"></textarea>
                </div>

                <div class="form-group">
                    <label for="trip-audio">Soundtrack URL (optional):</label>
                    <input type="text" id="trip-audio" name="trip-audio" placeholder="https://example.com/song.mp3">
                </div>
                
                <div class="form-actions">
                    <button type="button" id="btn-get-location">Get My Location</button>
                    <input type="hidden" id="trip-lat" name="trip-lat">
                    <input type="hidden" id="trip-lng" name="trip-lng">
                    
                    <button type="submit" id="btn-save-trip">Save Trip</button>
                </div>
            </form>
        </section>

        <article id="view-detail" class="view">
            <header>
                <h2 id="detail-title">Trip Title</h2>
                <p id="detail-date" class="meta-info">Date</p>
                <star-rating id="detail-rating" readonly></star-rating>
            </header>
            <div id="detail-content">
                <p id="detail-notes">Trip notes will appear here.</p>
                <p id="detail-location">Coordinates: <span id="detail-coords">Unknown</span></p>
                
                <div class="audio-player-container" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Trip Soundtrack:</p>
                    <audio id="trip-audio-element" preload="none"></audio>
                    <button id="btn-play-audio" style="padding: 0.6rem 1.2rem; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer;">▶ Play Soundtrack</button>
                </div>
            </div>
            <footer>
                <button id="btn-back-dashboard">Back to Dashboard</button>
            </footer>
        </article>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
